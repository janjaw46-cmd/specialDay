<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=IBM+Plex+Sans+Thai:wght@100;200;300;400;500;600;700&display=swap');

        :root {
            --bg: #1A3263;
            --ink: #1A1916;
            --ink-soft: #58554D;
            --ink-muted: #e1d9cc;
            --gold: #FFC570;
            --white: #FFFFFF;
            --border: rgba(0, 0, 0, 0.09);
            --border-strong: rgba(0, 0, 0, 0.15);
            --accent: #2563EB;
        }

        html, body {
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            overflow-x: hidden;
        }

        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1.5rem 5rem;
            gap: 0;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeUp 0.6s 0.1s both;
        }

        .handFont { font-family: "Caveat", cursive; font-weight: 600; }

        .eyebrowedit {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.16em;
            color: #EFD2B0;
            margin-bottom: 0.75rem;
        }

        .line {
            font-size: 1.25rem;
            margin: 10px 0;
            white-space: pre-wrap;
            color: #EFD2B0;
        }

        .cursor {
            border-right: 2px solid #547792;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink { 50% { border-color: transparent; } }

        #mainContent {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            opacity: 0;
            visibility: hidden;
        }

        #mainContent.revealed {
            visibility: visible;
            animation: fadeUp 0.7s ease forwards;
        }

        .scene-hint {
            font-size: 1rem;
            color: whitesmoke;
            text-align: center;
            margin-bottom: 0.5rem;
            min-height: 20px;
            font-weight: 800;
        }

        .card {
            text-align: center;
            margin: 20px auto;
            width: 320px;
        }

        .frame {
            position: relative;
            display: inline-block;
            border: 6px solid #FFC570;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            background: #000;
            width: 100%;
        }

        .frame img, .frame video {
            width: 100%;
            display: block;
            transition: opacity 0.5s ease;
        }

        .frame img.fade-out { opacity: 0; }
        .frame img.fade-in  { opacity: 1; }

        #videoCard {
            text-align: center;
            margin: 20px auto;
            width: 320px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(24px);
            transition: opacity 0.6s ease, transform 0.6s ease, visibility 0.6s;
        }

        #videoCard.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .wish-btn {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px 0;
            font-size: 1.2rem;
            background: rgba(84, 119, 146, 0.9);
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .wish-btn:hover { background: #1A3263; }

        .candle-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 25%;
            font-size: 1.1rem;
            background: rgba(84, 119, 146, 0.85);
            color: white;
            opacity: 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            transition: background 0.3s, transform 0.2s;
        }

        .candle-btn:hover {
            background: rgba(26, 50, 99, 0.95);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .candle-btn:disabled {
            opacity: 0.5;
            cursor: default;
            transform: translate(-50%, -50%) scale(1);
        }

        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            max-width: 480px;
        }

        .fan-wrap {
            position: relative;
            width: 280px;
            height: 320px;
            cursor: pointer;
        }

        .fan-wrap .c {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 120px;
            margin-left: -60px;
            height: 172px;
            border-radius: 14px;
            border: 0.5px solid var(--border-strong);
            background: var(--white);
            transform-origin: bottom center;
            transition: transform 0.42s cubic-bezier(.4,0,.2,1), opacity 0.45s ease, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            user-select: none;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .fan-wrap .c .c-icon { font-size: 32px; }

        .fan-wrap .c .c-icon img {
            width: 52px;
            height: 52px;
            object-fit: cover;
            border-radius: 50%;
        }

        .fan-wrap .c .c-num {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: var(--ink-muted);
        }

        .fan-wrap.spread .c:nth-child(1) { transform: rotate(-52deg) translateY(-22px); z-index: 1; }
        .fan-wrap.spread .c:nth-child(2) { transform: rotate(-26deg) translateY(-12px); z-index: 2; }
        .fan-wrap.spread .c:nth-child(3) { transform: rotate(0deg)   translateY(-7px);  z-index: 3; }
        .fan-wrap.spread .c:nth-child(4) { transform: rotate(26deg)  translateY(-12px); z-index: 2; }
        .fan-wrap.spread .c:nth-child(5) { transform: rotate(52deg)  translateY(-22px); z-index: 1; }

        .fan-wrap .c.read { opacity: 0.22; pointer-events: none; }

        /* hidden until scrolled into view */
        .fan-wrap .c {
            opacity: 0;
            transform: translateY(30px) rotate(0deg);
        }

        .fan-wrap.cards-ready.idle .c:nth-child(1) { opacity: 1; transform: rotate(-32deg); }
        .fan-wrap.cards-ready.idle .c:nth-child(2) { opacity: 1; transform: rotate(-16deg); }
        .fan-wrap.cards-ready.idle .c:nth-child(3) { opacity: 1; transform: rotate(0deg);   }
        .fan-wrap.cards-ready.idle .c:nth-child(4) { opacity: 1; transform: rotate(16deg);  }
        .fan-wrap.cards-ready.idle .c:nth-child(5) { opacity: 1; transform: rotate(32deg);  }

        .fan-wrap.cards-ready.spread .c:nth-child(1) { opacity: 1; transform: rotate(-52deg) translateY(-22px); }
        .fan-wrap.cards-ready.spread .c:nth-child(2) { opacity: 1; transform: rotate(-26deg) translateY(-12px); }
        .fan-wrap.cards-ready.spread .c:nth-child(3) { opacity: 1; transform: rotate(0deg)   translateY(-7px);  }
        .fan-wrap.cards-ready.spread .c:nth-child(4) { opacity: 1; transform: rotate(26deg)  translateY(-12px); }
        .fan-wrap.cards-ready.spread .c:nth-child(5) { opacity: 1; transform: rotate(52deg)  translateY(-22px); }

        .fan-wrap.cards-ready .c:nth-child(1) { transition: opacity 0.5s 0.0s ease, transform 0.42s 0.0s cubic-bezier(.4,0,.2,1), box-shadow 0.2s; }
        .fan-wrap.cards-ready .c:nth-child(2) { transition: opacity 0.5s 0.1s ease, transform 0.42s 0.1s cubic-bezier(.4,0,.2,1), box-shadow 0.2s; }
        .fan-wrap.cards-ready .c:nth-child(3) { transition: opacity 0.5s 0.2s ease, transform 0.42s 0.2s cubic-bezier(.4,0,.2,1), box-shadow 0.2s; }
        .fan-wrap.cards-ready .c:nth-child(4) { transition: opacity 0.5s 0.3s ease, transform 0.42s 0.3s cubic-bezier(.4,0,.2,1), box-shadow 0.2s; }
        .fan-wrap.cards-ready .c:nth-child(5) { transition: opacity 0.5s 0.4s ease, transform 0.42s 0.4s cubic-bezier(.4,0,.2,1), box-shadow 0.2s; }

        .fan-wrap.cards-ready .c.read { opacity: 0.22; }

        .fan-wrap.spread .c:not(.read):hover {
            box-shadow: 0 0 0 2.5px var(--accent), 0 4px 20px rgba(0,0,0,0.1);
            z-index: 20 !important;
        }

        .msg-area { width: 100%; }

        .msg-card {
            background: var(--white);
            border: 0.5px solid var(--border-strong);
            border-radius: 18px;
            padding: 1.75rem 1.5rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 0.38s ease, transform 0.38s ease, box-shadow 0.2s ease;
            pointer-events: none;
            cursor: grab;
        }

        .msg-card.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .msg-card.paused {
            box-shadow: 0 0 0 3px var(--gold);
            cursor: grabbing;
        }

        .pause-label {
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 197, 112, 0.92);
            color: #1A1916;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            padding: 4px 12px;
            border-radius: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            white-space: nowrap;
        }

        .msg-card-wrap { position: relative; }

        .msg-card.paused + .pause-label,
        .msg-card-wrap .pause-label.show { opacity: 1; }

        .msg-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .msg-icon-wrap {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .msg-title { font-size: 16px; font-weight: 500; color: var(--ink); }

        .msg-body {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 16px;
            color: var(--ink-soft);
            line-height: 1.85;
        }

        .msg-from {
            font-size: 12px;
            color: var(--ink-muted);
            padding-top: 0.75rem;
            border-top: 0.5px solid var(--border);
        }

        .pbar-wrap {
            margin-top: 0.25rem;
            height: 2px;
            background: rgba(0,0,0,0.07);
            border-radius: 2px;
            overflow: hidden;
        }

        .pbar-fill {
            height: 100%;
            background: var(--gold);
            transform-origin: left;
            transform: scaleX(1);
        }

        .progress {
            font-size: 1rem;
            color: var(--ink-muted);
            text-align: center;
            min-height: 20px;
            transition: color 0.3s;
            font-weight: 500;
        }

        .progress.done { color: var(--gold); font-weight: 500; font-size: 1rem; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #giftCard {
            text-align: center;
            margin: 20px auto;
            width: 320px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(24px);
            transition: opacity 0.6s ease, transform 0.6s ease, visibility 0.6s;
        }

        #giftCard.visible { opacity: 1; visibility: visible; transform: translateY(0); }

        #giftImage { cursor: pointer; transition: transform 0.15s ease; }
        #giftImage:hover  { transform: scale(1.03); }
        #giftImage:active { transform: scale(0.97); }

        #bdMessage {
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease, visibility 0.8s;
            text-align: center;
            margin: 1.5rem 0 0.5rem;
        }

        #bdMessage.visible { opacity: 1; visibility: visible; transform: translateY(0); }

        #bdMessage p {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 6vw, 2.4rem);
            color: var(--gold);
            letter-spacing: 0.02em;
        }

        @keyframes floatNote {
            0%   { opacity: 0; transform: translateY(0) scale(0.8); }
            20%  { opacity: 1; }
            80%  { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-60px) scale(1.1); }
        }

        .music-note {
            position: fixed;
            font-size: 1.4rem;
            pointer-events: none;
            animation: floatNote 1.8s ease-out forwards;
            z-index: 999;
        }

        /* scroll to top button */
        #toTopBtn {
            position: fixed;
            bottom: 2rem;
            right: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gold);
            color: #1A1916;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s, background 0.2s;
            z-index: 9999;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }

        #toTopBtn.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #toTopBtn:hover { background: #FFD9A0; }
        #toTopBtn:active { transform: scale(0.93); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }

        @media (max-width: 420px) {
            .fan-wrap { width: 240px; height: 280px; }
            .fan-wrap .c { width: 104px; margin-left: -52px; height: 152px; }
        }
    </style>
</head>

<body>
    <button id="toTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="กลับด้านบน">▲</button>

    <div class="page">

        <div class="hero eyebrowedit handFont" id="hero"></div>

        <div id="mainContent">

            <p class="scene-hint" id="sceneHint">📢 Click the button to make a wish !</p>
            <div class="card">
                <div class="frame">
                    <img id="cardImage" src="./src/image/P1.1.png" alt="Birthday Cake">
                    <button class="wish-btn" id="wishBtn" onclick="handleWishBtn()">✨ Make a Wish ✨</button>
                    <div class="candle-btn" id="candleBtn" onclick="changeImage()"></div>
                </div>
            </div>

            <audio id="hbd">
                <source src="./src/audio/hbd.mp3" type="audio/mpeg">
            </audio>

            <audio id="cardMusic" loop>
                <source src="./src/audio/bgmusic.mp3" type="audio/mpeg">
            </audio>

            <div id="videoCard">
                <p class="scene-hint" id="videoHint">🎉 And now... a little something for you !</p>
                <div class="card">
                    <div class="frame">
                        <video id="countdownVideo" src="./src/image/countdown.mp4" controls playsinline preload="metadata"></video>
                    </div>
                </div>
            </div>

            <div id="giftCard">
                <p class="scene-hint" id="giftHint">🎁 Here's a special gift for you !<br>tap to unwrap !</p>
                <div class="card">
                    <div class="frame">
                        <img id="giftImage" src="./src/image/gift_box.png" alt="Gift" onclick="unwrapGift()">
                    </div>
                </div>
            </div>

            <div id="bdMessage">
                <p>Happy Birthday Dev ❤️</p>
            </div>

            <div class="stage" style="margin-top: 0.5rem;">
                <p class="scene-hint" id="hint">📢 hover to spread cards · click a card to read a message</p>
                <div class="fan-wrap idle" id="fan" onmouseenter="spreadFan()" onmouseleave="foldFan()">
                    <div class="c" onclick="pick(0)"><span class="c-icon"><img src="./src/image/foryou.jpeg" alt="Mom"></span><span class="c-num">01</span></div>
                    <div class="c" onclick="pick(1)"><span class="c-icon"><img src="./src/image/foryou.jpeg" alt="Dad"></span><span class="c-num">02</span></div>
                    <div class="c" onclick="pick(2)"><span class="c-icon"><img src="./src/image/foryou.jpeg" alt="Gigi"></span><span class="c-num">03</span></div>
                    <div class="c" onclick="pick(3)"><span class="c-icon"><img src="./src/image/foryou.jpeg" alt="Jennie"></span><span class="c-num">04</span></div>
                    <div class="c" onclick="pick(4)"><span class="c-icon"><img src="./src/image/foryou.jpeg" alt="Janjao"></span><span class="c-num">05</span></div>
                </div>

                <div class="msg-area">
                    <div class="msg-card-wrap">
                        <div class="msg-card" id="msgCard">
                            <div class="msg-top">
                                <div class="msg-icon-wrap" id="msgIcon"></div>
                                <span class="msg-title" id="msgTitle"></span>
                            </div>
                            <p class="msg-body" id="msgBody"></p>
                            <p class="msg-from" id="msgFrom"></p>
                            <div class="pbar-wrap">
                                <div class="pbar-fill" id="pFill"></div>
                            </div>
                        </div>
                        <span class="pause-label" id="pauseLabel">⏸ hold to pause</span>
                    </div>
                </div>

                <p class="progress" id="progress"></p>
            </div>

        </div>
    </div>

    <script>
        // ─── Reveal fan cards on scroll ──────────────────────────────────────────
        const fanObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    fan.classList.add('cards-ready');
                    fanObserver.disconnect();
                }
            });
        }, { threshold: 0.3 });
        fanObserver.observe(document.getElementById('fan'));

        // ─── Scroll to top button ────────────────────────────────────────────────
        const toTopBtn = document.getElementById('toTopBtn');
        window.addEventListener('scroll', () => {
            toTopBtn.classList.toggle('show', window.scrollY > 300);
        });

        // ─── Typewriter ──────────────────────────────────────────────────────────
        const lines = [
            "This year ...",
            "29 June 2026",
            "There is something, I want to say to you ! 🌟"
        ];
        let lineIdx = 0, charIdx = 0;

        function typeWriter() {
            if (lineIdx >= lines.length) { revealContent(); return; }
            if (charIdx === 0) {
                const p = document.createElement("p");
                p.className = "line";
                p.id = "line" + lineIdx;
                document.getElementById("hero").appendChild(p);
            }
            const currentLine = document.getElementById("line" + lineIdx);
            currentLine.innerHTML = lines[lineIdx].substring(0, charIdx + 1) + '<span class="cursor"></span>';
            charIdx++;
            if (charIdx < lines[lineIdx].length) {
                setTimeout(typeWriter, 100);
            } else {
                currentLine.innerHTML = lines[lineIdx];
                charIdx = 0; lineIdx++;
                setTimeout(typeWriter, 1000);
            }
        }

        function revealContent() {
            document.getElementById("mainContent").classList.add("revealed");
        }

        typeWriter();

        // ─── Scene 1 : slideshow ─────────────────────────────────────────────────
        const images = [
            "./src/image/P1.1.jpeg",
            "./src/image/P1.2.png",
            "./src/image/P1.3.png",
            "./src/image/P1.4.png"
        ];
        let current = 0;

        function handleWishBtn() {
            document.getElementById("hbd").play();
            document.getElementById("wishBtn").style.display = "none";
            document.getElementById("candleBtn").style.display = "block";
            document.getElementById("sceneHint").textContent = "📢 Click the candle to blow it out! Tap a few times to see the magic 💫";
            changeImage();
        }

        function changeImage() {
            if (current >= images.length - 1) return;
            const img = document.getElementById("cardImage");
            img.classList.add("fade-out");
            setTimeout(() => {
                current++;
                img.src = images[current];
                img.classList.remove("fade-out");
                img.classList.add("fade-in");
                setTimeout(() => img.classList.remove("fade-in"), 500);

                if (current >= images.length - 1) {
                    document.getElementById("candleBtn").style.display = "none";
                    document.getElementById("sceneHint").textContent = "🎂 HBD !";
                    const audio = document.getElementById("hbd");

                    function showVideo() {
                        const vc = document.getElementById("videoCard");
                        vc.classList.add("visible");
                        const vid = document.getElementById("countdownVideo");
                        vid.play().catch(() => {});
                        vc.scrollIntoView({ behavior: "smooth", block: "start" });
                        vid.addEventListener("ended", showGift, { once: true });
                    }

                    function showGift() {
                        const gc = document.getElementById("giftCard");
                        gc.classList.add("visible");
                        gc.scrollIntoView({ behavior: "smooth", block: "start" });
                    }

                    if (audio.paused || audio.ended) { showVideo(); }
                    else { audio.addEventListener("ended", showVideo, { once: true }); }
                }
            }, 500);
        }

        // ─── Scene 3 : unwrap gift ───────────────────────────────────────────────
        let unwrapped = false;

        function unwrapGift() {
            if (unwrapped) return;
            unwrapped = true;
            const img = document.getElementById("giftImage");
            img.classList.add("fade-out");
            setTimeout(() => {
                img.src = "./src/image/art_toy.png";
                img.alt = "Art Toy";
                img.classList.remove("fade-out");
                img.classList.add("fade-in");
                setTimeout(() => img.classList.remove("fade-in"), 500);
                document.getElementById("giftHint").textContent = "🎨 Surprise ! 🎉";
                img.style.cursor = "default";

                // แสดง Happy Birthday message
                setTimeout(() => {
                    const msg = document.getElementById("bdMessage");
                    msg.classList.add("visible");
                    msg.scrollIntoView({ behavior: "smooth", block: "center" });

                    // ── เลื่อนไปซีนไพ่อัตโนมัติหลัง 2.5 วินาที ──
                    setTimeout(() => {
                        document.querySelector('.stage').scrollIntoView({ behavior: "smooth", block: "start" });
                    }, 2500);

                }, 600);
            }, 400);
        }

        // ─── Fan cards ──────────────────────────────────────────────────────────
        const CARDS = [
            { img: './src/image/foryou.jpeg', title: 'Birthday wish 🐣', body: 'Happy Birthday! 🎉 Hope you have the best birthday ever! Wishing you lots of happiness and success.', from: 'From Mom' },
            { img: './src/image/foryou.jpeg', title: 'Birthday wish 🐱', body: 'Happy Birthday! 🎂 Wishing you all the happiness, love, and success you deserve. on your special day! ❤️', from: 'From Dad' },
            { img: './src/image/foryou.jpeg', title: 'Birthday wish 🐞', body: 'Happy Birthday, babe! 🥳❤️ I hope your day is filled with happiness, laughter, and everything you love. Thank you for being such an incredible person. Wishing you an amazing year ahead. I love you, babe.✨🎉', from: 'From Gigi' },
            { img: './src/image/foryou.jpeg', title: 'Birthday wish 🦜', body: 'Happy Birthday! 🎉 Wishing you good health, happiness, success, and all the best in the year ahead.', from: 'From Jennie' },
            { img: './src/image/foryou.jpeg', title: 'Birthday wish 🐋', body: 'Happy Birthday! 🎂 Wishing you all the happiness and success in the year ahead. Have a great day!', from: 'From Janjao' },
        ];

        const READ_DELAY = 6500;
        let busy = false, readCount = 0;

        const fan        = document.getElementById('fan');
        const msgCard    = document.getElementById('msgCard');
        const msgIcon    = document.getElementById('msgIcon');
        const msgTitle   = document.getElementById('msgTitle');
        const msgBody    = document.getElementById('msgBody');
        const msgFrom    = document.getElementById('msgFrom');
        const pFill      = document.getElementById('pFill');
        const progress   = document.getElementById('progress');
        const hint       = document.getElementById('hint');
        const pauseLabel = document.getElementById('pauseLabel');

        // ─── Music notes ─────────────────────────────────────────────────────────
        const NOTES = ['♪', '♫', '♬', '♩'];
        let noteTimer = null;

        function spawnNote() {
            const note = document.createElement('span');
            note.className = 'music-note';
            note.textContent = NOTES[Math.floor(Math.random() * NOTES.length)];
            note.style.left  = (20 + Math.random() * (window.innerWidth - 60)) + 'px';
            note.style.top   = (window.innerHeight * 0.4 + Math.random() * window.innerHeight * 0.4) + 'px';
            note.style.color = `hsl(${30 + Math.random() * 30}, 90%, 70%)`;
            document.body.appendChild(note);
            setTimeout(() => note.remove(), 1900);
        }

        function startNotes() { spawnNote(); noteTimer = setInterval(spawnNote, 400); }
        function stopNotes()  { clearInterval(noteTimer); noteTimer = null; }

        // ─── Audio helpers ────────────────────────────────────────────────────────
        function fadeIn(audio, duration) {
            audio.volume = 0;
            audio.play().catch(() => {});
            const step = 50, inc = step / duration;
            const t = setInterval(() => {
                audio.volume = Math.min(1, audio.volume + inc);
                if (audio.volume >= 1) clearInterval(t);
            }, step);
        }

        function fadeOut(audio, duration, cb) {
            const step = 50, dec = step / duration;
            const t = setInterval(() => {
                audio.volume = Math.max(0, audio.volume - dec);
                if (audio.volume <= 0) {
                    clearInterval(t);
                    audio.pause();
                    audio.currentTime = 0;
                    if (cb) cb();
                }
            }, step);
        }

        function spreadFan() { fan.classList.replace('idle', 'spread'); }
        function foldFan()   { if (!busy) fan.classList.replace('spread', 'idle'); }

        // ─── Pick card ───────────────────────────────────────────────────────────
        function pick(i) {
            if (busy) return;
            const cardEls = fan.querySelectorAll('.c');
            const el = cardEls[i];
            if (el.classList.contains('read')) return;

            busy = true;
            fan.classList.replace('spread', 'idle');
            hint.textContent = 'Opening…';

            const cardMusic = document.getElementById('cardMusic');
            cardMusic.currentTime = 0;
            fadeIn(cardMusic, 800);
            startNotes();

            const d = CARDS[i];
            msgIcon.innerHTML    = `<img src="${d.img}" alt="${d.title}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            msgTitle.textContent = d.title;
            msgBody.innerHTML    = d.body.replace(/\n/g, '<br>');
            msgFrom.textContent  = d.from;

            msgCard.classList.add('visible');

            pauseLabel.textContent = '⏸ hold to pause';
            pauseLabel.classList.add('show');
            setTimeout(() => pauseLabel.classList.remove('show'), 2200);

            let remaining = READ_DELAY;
            let pausedAt  = null;
            let endTimer  = null;
            let isPaused  = false;

            function startBar(ms) {
                pFill.style.transition = 'none';
                const cur = getComputedStyle(pFill).transform;
                pFill.style.transform = cur === 'none' ? 'scaleX(1)' : cur;
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    pFill.style.transition = `transform ${ms}ms linear`;
                    pFill.style.transform  = 'scaleX(0)';
                }));
                endTimer = setTimeout(finishCard, ms);
            }

            function pauseCard() {
                if (isPaused) return;
                isPaused = true;
                pausedAt = Date.now();
                const cur = getComputedStyle(pFill).transform;
                pFill.style.transition = 'none';
                pFill.style.transform  = cur;
                clearTimeout(endTimer);
                fadeOut(cardMusic, 300);
                stopNotes();
                msgCard.classList.add('paused');
                pauseLabel.textContent = '⏸ paused — release to continue';
                pauseLabel.classList.add('show');
            }

            function resumeCard() {
                if (!isPaused) return;
                isPaused = false;
                remaining -= Date.now() - pausedAt;
                pausedAt = null;
                fadeIn(cardMusic, 300);
                startNotes();
                msgCard.classList.remove('paused');
                pauseLabel.textContent = '▶ resuming…';
                setTimeout(() => pauseLabel.classList.remove('show'), 900);
                startBar(remaining);
            }

            function finishCard() {
                el.classList.add('read');
                readCount++;
                msgCard.classList.remove('visible');
                msgCard.classList.remove('paused');
                pauseLabel.classList.remove('show');
                fadeOut(cardMusic, 700);
                stopNotes();
                msgCard.removeEventListener('mousedown',  pauseCard);
                msgCard.removeEventListener('touchstart', pauseCard);
                msgCard.removeEventListener('mouseup',    resumeCard);
                msgCard.removeEventListener('mouseleave', resumeCard);
                msgCard.removeEventListener('touchend',   resumeCard);
                const left = CARDS.length - readCount;
                if (left > 0) {
                    progress.textContent = `Opened ${readCount} cards · ${left} left`;
                    hint.textContent = 'Hover to spread cards · Click a card to read its message';
                } else {
                    progress.textContent = 'All cards opened ! 🎂 Happy Birthday! Love from everyone !';
                    progress.classList.add('done');
                    hint.textContent = '';
                }
                busy = false;
            }

            msgCard.addEventListener('mousedown',  pauseCard);
            msgCard.addEventListener('touchstart', pauseCard, { passive: true });
            msgCard.addEventListener('mouseup',    resumeCard);
            msgCard.addEventListener('mouseleave', resumeCard);
            msgCard.addEventListener('touchend',   resumeCard);

            pFill.style.transition = 'none';
            pFill.style.transform  = 'scaleX(1)';
            startBar(remaining);
        }
    </script>
</body>
